<!DOCTYPE html>
<html lang="en">
<head>
    <title>Email Check - ElderGuard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" />
    <link rel="stylesheet" href="./index.css" />
    <link rel="stylesheet" href="./email.css" />
</head>
<body>
    <header class="home-container10">
        <a href="index.html" class="home-container11" style="text-decoration: none;">
            <img src="assets/logo.svg" alt="Logo" class="home-logo" />
            <h1 class="home-text1">ElderGuard</h1>
        </a>
    </header>
    <div class="translate-wrapper">
      <div class="translate-container">
        <div id="google_translate_element"></div>
        <svg viewBox="0 0 24 24" class="success-icon" width="20" height="20">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15l-5-5 1.41-1.41L11 14.17l7.59-7.59L20 8l-9 9z"></path>
        </svg>
      </div>
    </div>


    <main class="home-container12">
        <h1 class="home-text2" style="font-size: 3rem;">Sender Verification</h1>
        <p class="home-text3" style="font-size: 1.4rem;">Type in the <b>email address</b> of the person who messaged you:</p>

        <input type="email" id="emailInput" class="input-area" placeholder="example@gmail.com">
        
        <button type="button" id="scanBtn" class="button" onclick="checkEmailDomain()">Check Sender</button>

        <div id="email-result">
            <p id="resultHeadline"></p>
            <p id="resultDetails"></p>
            <br>
            <a href="index.html" class="button-link" style="padding: 15px 40px;">Go Back</a>
        </div>
    </main>

    <script src="email.js"></script>
    <script src="translate.js"></script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
